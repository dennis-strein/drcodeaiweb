<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Single Page Apps for GitHub Pages
        // Store the path and redirect to index.html
        var path = window.location.pathname;

        // Route to static HTML pages
        if (path === '/delete-account' || path === '/deleteaccount') {
            window.location.replace('/delete-account.html');
        }
        else if (path === '/privacy' || path === '/privacy-policy') {
            window.location.replace('/privacy.html');
        }
        else if (path === '/impressum') {
            window.location.replace('/impressum.html');
        }
        else if (path === '/stylechatai' || path === '/style-chat-ai') {
            window.location.replace('/stylechatai.html');
        }
        // Redirect everything else to homepage
        else if (path !== '/' && path !== '/index.html') {
            window.location.replace('/index.html');
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
