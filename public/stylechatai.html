<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Chat AI - dr-code.ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f4f4f5;
            --gray-200: #e4e4e7;
            --gray-400: #71717a;
            --gray-600: #52525b;
            --gray-800: #27272a;
            --accent: #b87d4b;
            --accent-dark: #a06835;
            --accent-light: #f5e8d8;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            color: var(--black);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* MADE BY FOOTER */
        .made-by-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 24px 36px;
            border-top: 1px solid var(--gray-200);
        }

        .made-by-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--gray-400);
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
            letter-spacing: 0.01em;
        }

        .made-by-link:hover { color: var(--black); }

        .made-by-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        /* HERO */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px 32px;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(184, 125, 75, 0.08) 0%, transparent 70%),
                        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(184, 125, 75, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-brand {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .hero-brand-text {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }

        .hero-app-icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            flex-shrink: 0;
        }

        .hero-brand-name {
            font-size: clamp(28px, 4.5vw, 52px);
            font-weight: 600;
            letter-spacing: -0.04em;
            color: var(--black);
            line-height: 1;
        }

        .hero-brand-tagline {
            font-size: clamp(12px, 1.2vw, 14px);
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray-400);
        }

        .hero-brand-tagline .gradient-text {
            background: linear-gradient(135deg, #c9985c 0%, #b87d4b 50%, #e8c4a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-light);
            border: 1px solid rgba(184,125,75,0.2);
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-dark);
            margin-bottom: 20px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .hero-badge-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero-sub {
            font-size: clamp(14px, 1.3vw, 16px);
            color: var(--gray-600);
            max-width: 460px;
            margin: 0 auto 24px;
            line-height: 1.6;
            font-weight: 400;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .gplay-badge-link {
            display: inline-block;
            transition: transform 0.2s, opacity 0.2s;
        }

        .gplay-badge-link:hover { transform: scale(0.97); opacity: 0.88; }

        .gplay-badge-img {
            height: 72px;
            width: auto;
            display: block;
        }

        /* FEATURE GRAPHICS */
        .graphics-section {
            padding: 16px 0 80px;
            overflow: hidden;
        }

        .graphics-marquee {
            display: flex;
            gap: 24px;
            width: max-content;
            animation: marquee 40s linear infinite;
        }

        .graphics-marquee:hover { animation-play-state: paused; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .graphic-item {
            flex-shrink: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .graphic-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.13);
        }

        .graphic-item img {
            display: block;
            height: 380px;
            width: auto;
        }

        /* CTA SECTION */
        .cta-section {
            padding: 0 24px 120px;
            text-align: center;
        }

        .cta-inner {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 32px;
            padding: 80px 40px;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .cta-glow {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(184,125,75,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .cta-app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 24px;
            display: block;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .cta-title {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            color: var(--black);
        }

        .cta-sub {
            font-size: 17px;
            color: var(--gray-600);
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--gray-200);
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-copy {
            font-size: 13px;
            color: var(--gray-600);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 13px;
            color: var(--gray-600);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--gray-400); }

        @media (max-width: 640px) {
            .cta-inner { padding: 48px 24px; }
            .graphic-item img { height: 260px; }
        }
    </style>
</head>
<body>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-brand">
            <img src="/applogo.png" alt="Style Chat AI" class="hero-app-icon">
            <div class="hero-brand-text">
                <span class="hero-brand-name">Style Chat AI</span>
                <span class="hero-brand-tagline">Your Style, <span class="gradient-text">Elevated.</span></span>
            </div>
        </div>
        <p class="hero-sub">Meet your personal AI stylist. Chat naturally, get curated outfit ideas, and discover looks that are unmistakably you.</p>
        <div class="hero-actions">
            <a href="https://play.google.com/store/apps/details?id=com.stylechatai" target="_blank" rel="noopener noreferrer" class="gplay-badge-link">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" class="gplay-badge-img">
            </a>
        </div>
    </section>

    <!-- FEATURE GRAPHICS -->
    <section class="graphics-section">
        <div class="graphics-marquee">
            <!-- First set -->
            <div class="graphic-item"><img src="/1.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/2.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/3.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/4.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/5.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/6.jpg" alt="Style Chat AI feature"></div>
            <!-- Duplicate for seamless loop -->
            <div class="graphic-item"><img src="/1.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/2.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/3.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/4.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/5.jpg" alt="Style Chat AI feature"></div>
            <div class="graphic-item"><img src="/6.jpg" alt="Style Chat AI feature"></div>
        </div>
    </section>

    <!-- MADE BY FOOTER -->
    <footer class="made-by-footer">
        <a href="https://dr-code.ai" class="made-by-link">
            <img src="/dr-code.png" alt="dr-code.ai" class="made-by-icon">
            Made by dr-code.ai
        </a>
    </footer>

</body>
</html>
