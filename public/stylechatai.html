<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Chat AI - dr-code.ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f4f4f5;
            --gray-200: #e4e4e7;
            --gray-400: #71717a;
            --gray-600: #52525b;
            --gray-800: #27272a;
            --accent: #b87d4b;
            --accent-dark: #a06835;
            --accent-light: #f5e8d8;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            color: var(--black);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--black);
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .nav-logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--gray-400);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
            letter-spacing: 0.01em;
        }

        .back-link:hover { color: var(--black); }

        .nav-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--black);
            color: var(--white);
            padding: 9px 20px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.2s;
        }

        .nav-cta:hover { opacity: 0.82; transform: scale(0.98); }

        /* HERO */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 24px 60px;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(184, 125, 75, 0.08) 0%, transparent 70%),
                        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(184, 125, 75, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .hero-app-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        .hero-brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--black);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-light);
            border: 1px solid rgba(184,125,75,0.2);
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-dark);
            margin-bottom: 20px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .hero-badge-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero h1 {
            font-size: clamp(28px, 4vw, 48px);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1.05;
            margin-bottom: 16px;
            max-width: 700px;
        }

        .hero h1 .gradient-text {
            background: linear-gradient(135deg, #c9985c 0%, #b87d4b 50%, #e8c4a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: clamp(15px, 1.5vw, 17px);
            color: var(--gray-600);
            max-width: 460px;
            margin: 0 auto 32px;
            line-height: 1.6;
            font-weight: 400;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--black);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 100px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: opacity 0.2s, transform 0.2s;
            letter-spacing: -0.01em;
        }

        .btn-primary:hover { opacity: 0.82; transform: scale(0.98); }

        .play-icon { width: 20px; height: 20px; }

        /* FEATURE GRAPHICS */
        .graphics-section {
            padding: 40px 0 100px;
            overflow: hidden;
        }

        .graphics-marquee {
            display: flex;
            gap: 24px;
            width: max-content;
            animation: marquee 40s linear infinite;
        }

        .graphics-marquee:hover { animation-play-state: paused; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .graphic-item {
            flex-shrink: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .graphic-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.13);
        }

        .graphic-item img {
            display: block;
            height: 380px;
            width: auto;
        }

        /* CTA SECTION */
        .cta-section {
            padding: 0 24px 120px;
            text-align: center;
        }

        .cta-inner {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 32px;
            padding: 80px 40px;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .cta-glow {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(184,125,75,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .cta-app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 24px;
            display: block;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .cta-title {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            color: var(--black);
        }

        .cta-sub {
            font-size: 17px;
            color: var(--gray-600);
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--gray-200);
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-copy {
            font-size: 13px;
            color: var(--gray-600);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 13px;
            color: var(--gray-600);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--gray-400); }

        @media (max-width: 640px) {
            nav { padding: 16px 20px; }
            .nav-cta { display: none; }
            footer { padding: 24px 20px; flex-direction: column; align-items: flex-start; }
            .cta-inner { padding: 48px 24px; }
            .graphic-item img { height: 260px; }
        }
    </style>
</head>
<body>
